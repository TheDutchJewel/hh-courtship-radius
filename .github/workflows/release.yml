name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release archive
        shell: bash
        run: |
          module_name="hh-module-template"
          version="${GITHUB_REF_NAME#v}"
          git archive --format=zip --prefix="${module_name}/" --output="${module_name}-${version}.zip" HEAD
          sha256sum "${module_name}-${version}.zip" > "${module_name}-${version}.zip.sha256"
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" ./*.zip ./*.sha256 --clobber

